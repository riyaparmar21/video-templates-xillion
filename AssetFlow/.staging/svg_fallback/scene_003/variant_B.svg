<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#e9d8a6" />
  <!-- Marketplace Background -->
  <g>
    <rect x="0" y="0" width="800" height="150" fill="#6e4a2d" />
    <rect x="50" y="50" width="120" height="100" fill="#8b5e34" />
    <rect x="200" y="50" width="120" height="100" fill="#8b5e34" />
    <rect x="350" y="50" width="120" height="100" fill="#8b5e34" />
    <rect x="500" y="50" width="120" height="100" fill="#8b5e34" />
  </g>
  <!-- Coin Stamping Scene -->
  <g>
    <circle cx="200" cy="400" r="90" fill="#ffd700" stroke="#d4af37" stroke-width="5" />
    <text x="160" y="410" fill="#8b5e34" font-family="Helvetica, sans-serif" font-size="36">👑</text>
  </g>
  <g>
    <circle cx="400" cy="400" r="90" fill="#ffd700" stroke="#d4af37" stroke-width="5" />
    <text x="360" y="410" fill="#8b5e34" font-family="Helvetica, sans-serif" font-size="36">🦁</text>
  </g>
  <g>
    <circle cx="600" cy="400" r="90" fill="#ffd700" stroke="#d4af37" stroke-width="5" />
    <text x="560" y="410" fill="#8b5e34" font-family="Helvetica, sans-serif" font-size="36">⚒️</text>
  </g>
</svg>