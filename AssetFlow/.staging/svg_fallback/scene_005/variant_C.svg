<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    .background { fill: #f2efe9; }
    .abstract-circle { fill: #734f31; opacity: 0.8; }
    .abstract-shield { fill: #b58569; stroke: #734f31; stroke-width: 8; }
    .abstract-line { stroke: #262626; stroke-width: 5; stroke-dasharray: 10; }
  </style>
  <rect width="800" height="600" class="background" />
  <g transform="translate(400,300)">
    <circle class="abstract-circle" r="150" />
    <path class="abstract-shield" d="M -90 -140 Q 0 -180 90 -140 Q 120 0 90 140 Q 0 180 -90 140 Q -120 0 -90 -140 Z" />
    <line class="abstract-line" x1="-100" y1="-100" x2="100" y2="100" />
    <line class="abstract-line" x1="100" y1="-100" x2="-100" y2="100" />
  </g>
</svg>