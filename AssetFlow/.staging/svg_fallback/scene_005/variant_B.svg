<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    .background { fill: #e6dbc8; }
    .outer-circle { fill: none; stroke: #8b5a2b; stroke-width: 10; }
    .inner-shield { fill: #cfb997; stroke: #6b4226; stroke-width: 5; }
    .flourish { fill: #6b4226; }
    .text { font-family: Arial, sans-serif; font-size: 24px; fill: #262626; text-anchor: middle; }
  </style>
  <rect width="800" height="600" class="background" />
  <g transform="translate(400,300)">
    <circle class="outer-circle" r="200" />
    <path class="inner-shield" d="M -80 -100 Q 0 -200 80 -100 Q 100 0 80 100 Q 0 200 -80 100 Q -100 0 -80 -100 Z" />
    <path class="flourish" d="M -120 -140 Q 0 -180 120 -140 Q 140 -120 120 -100 Q 0 0 -120 -100 Q -140 -120 -120 -140 Z" />
    <text class="text" x="0" y="0">Trust</text>
  </g>
</svg>