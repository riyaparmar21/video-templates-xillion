<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GroundCaptions Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }

  .phone-frame {
    width: 360px;
    height: 640px;
    position: relative;
    overflow: hidden;
    border: 2px solid #444;
    border-radius: 8px;
  }

  .phone-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Values from ground-captions-spec.json */
  .perspective-stage {
    position: absolute;
    left: 83.3%;
    top: 87.3%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    perspective: 416px;
    perspective-origin: 51.5% 33.1%;
    z-index: 50;
  }

  .ground-text {
    text-align: center;
    line-height: 0.85;
    text-transform: uppercase;
    color: #FFFFFF;
    white-space: nowrap;
    font-family: 'Arial Black', 'Impact', sans-serif;
    font-weight: 900;
    font-size: 40px;

    transform: rotateX(63.4deg) rotateZ(-8.7deg) scaleY(2.23);
    transform-origin: bottom center;

    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
    opacity: 0.95;
  }

  .info {
    position: fixed;
    top: 10px; left: 10px;
    color: #aaa; font-size: 12px;
    font-family: monospace;
  }
</style>
</head>
<body>
  <div class="info">
    perspective: 416px | rotateX: 63.4° | rotateZ: -8.7° | scaleY: 2.23<br>
    perspectiveOrigin: 51.5% 33.1% | position: 83.3%, 87.3%
  </div>

  <div class="phone-frame">
    <img src="public/groundCaptions/background.png" alt="background">

    <div class="perspective-stage">
      <div class="ground-text">
        <div>KISI KO</div>
        <div>BATANA</div>
        <div>MAT</div>
      </div>
    </div>
  </div>
</body>
</html>
