<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GroundCaptions Tuner</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:#0a0a0a; display:flex; height:100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color:#fff; }

/* ── Left panel: controls ── */
.controls {
  width: 300px; padding: 14px; background: #141414;
  display:flex; flex-direction:column; gap:10px;
  overflow-y:auto; flex-shrink:0; border-right: 1px solid #222;
  height: 100vh;
}
.controls h3 { color:#4af; font-size:15px; margin-bottom:4px; }
.section { background:#1a1a1a; border-radius:8px; padding:12px; }
.section-title { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }

.control-row { margin-bottom: 10px; }
.control-row label { display:flex; justify-content:space-between; font-size:12px; color:#aaa; margin-bottom:3px; }
.control-row .val { color:#4af; font-weight:600; font-family:monospace; }
.control-row input[type=range] { width:100%; accent-color:#4af; }
.control-row input[type=text], .control-row input[type=color] {
  width:100%; padding:6px 8px; background:#222; border:1px solid #333;
  border-radius:4px; color:#fff; font-size:13px; font-family:monospace;
}
.control-row textarea {
  width:100%; padding:6px 8px; background:#222; border:1px solid #333;
  border-radius:4px; color:#fff; font-size:13px; font-family:monospace;
  resize:vertical; min-height:60px;
}

.btn {
  padding:10px 16px; border:none; border-radius:6px; cursor:pointer;
  font-weight:600; font-size:13px; width:100%; transition: all 0.15s;
}
.btn-primary { background:#4af; color:#000; }
.btn-primary:hover { background:#5bf; }
.btn-green { background:#2d8; color:#000; }
.btn-green:hover { background:#3e9; }
.btn-outline { background:transparent; border:1px solid #333; color:#aaa; }
.btn-outline:hover { border-color:#4af; color:#4af; }

.btn-row { display:flex; gap:8px; }
.btn-row .btn { flex:1; }

.status { font-size:11px; color:#666; text-align:center; padding:4px; }
.status.ok { color:#2d8; }
.status.error { color:#f55; }
.status.rendering { color:#fa0; }

/* ── Right panel: preview ── */
.preview {
  flex:1; display:flex; justify-content:center; align-items:center;
  padding:20px; position:relative; overflow:hidden;
  height: 100vh;
}
.phone-wrapper {
  height: 100%; max-height: calc(100vh - 40px);
  aspect-ratio: 9/16;
  max-width: 100%;
  position: relative;
}
.phone {
  width: 100%; height: 100%;
  position: relative; overflow: hidden;
  border-radius: 12px; background:#222;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
.phone img { width:100%; height:100%; object-fit:cover; pointer-events:none; }

.stage {
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 10;
  cursor: grab;
}
.stage:active { cursor: grabbing; }
.ground-text {
  text-align: center;
  text-transform: uppercase;
  color: white;
  font-family: 'Archivo Black', Impact, sans-serif;
  font-weight: 400;
  line-height: 0.85;
  white-space: nowrap;
  transform-origin: bottom center;
  pointer-events: none;
}

/* Crosshair on hover */
.phone:hover .crosshair { opacity: 1; }
.crosshair {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; opacity:0; transition:opacity 0.2s;
  z-index:5;
}
.crosshair .h, .crosshair .v {
  position:absolute; background:rgba(68,170,255,0.3);
}
.crosshair .h { left:0; right:0; height:1px; }
.crosshair .v { top:0; bottom:0; width:1px; }

.hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:11px; color:#555; pointer-events:none;
}
</style>
</head>
<body>

<div class="controls">
  <h3>GroundCaptions Tuner</h3>

  <!-- Text content -->
  <div class="section">
    <div class="section-title">Text Content</div>
    <div class="control-row">
      <label>Lines (one per line)</label>
      <textarea id="textLines">STOP
RIGHT
THERE</textarea>
    </div>
    <div class="control-row">
      <label>Font Family</label>
      <input type="text" id="fontFamily" value="Archivo Black" placeholder="Google Font name">
    </div>
    <div class="control-row" style="display:flex;gap:8px;">
      <div style="flex:1">
        <label>Color</label>
        <input type="color" id="textColor" value="#ffffff">
      </div>
      <div style="flex:1">
        <label>Hex</label>
        <input type="text" id="textColorHex" value="#FFFFFF">
      </div>
    </div>
  </div>

  <!-- 3D Transform -->
  <div class="section">
    <div class="section-title">3D Transform</div>
    <div class="control-row">
      <label>Font Size <span class="val" id="v-fs">200</span>px</label>
      <input type="range" id="fontSize" min="80" max="400" value="200">
    </div>
    <div class="control-row">
      <label>X-Axis (Tilt) <span class="val" id="v-rx">60</span>°</label>
      <input type="range" id="rotateX" min="0" max="85" value="60">
    </div>
    <div class="control-row">
      <label>Y-Axis (Yaw) <span class="val" id="v-ry">0</span>°</label>
      <input type="range" id="rotateY" min="-30" max="30" value="0">
    </div>
    <div class="control-row">
      <label>Z-Axis (Roll) <span class="val" id="v-rz">-5</span>°</label>
      <input type="range" id="rotateZ" min="-45" max="45" value="-5">
    </div>
    <div class="control-row">
      <label>Scale Y <span class="val" id="v-sy">2.5</span>x</label>
      <input type="range" id="scaleY" min="0.5" max="8" step="0.1" value="2.5">
    </div>
    <div class="control-row">
      <label>Perspective <span class="val" id="v-persp">1500</span>px</label>
      <input type="range" id="perspective" min="200" max="3000" value="1500">
    </div>
  </div>

  <!-- Position -->
  <div class="section">
    <div class="section-title">Position (or drag on preview)</div>
    <div class="control-row">
      <label>X <span class="val" id="v-px">50</span>%</label>
      <input type="range" id="posX" min="5" max="95" value="50">
    </div>
    <div class="control-row">
      <label>Y <span class="val" id="v-py">80</span>%</label>
      <input type="range" id="posY" min="10" max="95" value="80">
    </div>
  </div>

  <!-- Actions -->
  <div class="section">
    <div class="section-title">Actions</div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="loadSpec()">Load Spec</button>
      <button class="btn btn-primary" onclick="saveSpec()">Save Spec</button>
    </div>
    <div style="height:8px"></div>
    <button class="btn btn-green" id="renderBtn" onclick="saveAndRender()">Save & Render Video</button>
    <!-- Progress bar (hidden until render starts) -->
    <div id="progressWrap" style="display:none; margin-top:8px;">
      <div style="display:flex; justify-content:space-between; font-size:11px; color:#aaa; margin-bottom:3px;">
        <span id="progressLabel">Rendering...</span>
        <span id="progressPct">0%</span>
      </div>
      <div style="height:6px; background:#222; border-radius:3px; overflow:hidden;">
        <div id="progressBar" style="height:100%; width:0%; background:#2d8; border-radius:3px; transition:width 0.3s;"></div>
      </div>
    </div>
    <div class="status" id="status">Ready</div>
  </div>
</div>

<div class="preview">
  <div class="phone-wrapper">
    <div class="phone" id="phone">
      <img src="groundCaptions/background.png" alt="bg" id="bgImage">
      <div class="crosshair" id="crosshair">
        <div class="h" id="crossH"></div>
        <div class="v" id="crossV"></div>
      </div>
      <div class="stage" id="stage">
        <div class="ground-text" id="groundText"></div>
      </div>
    </div>
  </div>
  <div class="hint">Drag text to reposition · Sliders for 3D transform</div>
</div>

<script>
const API = window.location.origin;
const PHONE_W = 360, PHONE_H = 640;
const CANVAS_W = 1080, CANVAS_H = 1920;

// ── State ──
let spec = null;
let isDragging = false;
let dragOffsetX = 0, dragOffsetY = 0;

// ── Elements ──
const phone = document.getElementById('phone');
const stage = document.getElementById('stage');
const groundText = document.getElementById('groundText');
const crossH = document.getElementById('crossH');
const crossV = document.getElementById('crossV');

// ── Slider IDs ──
const sliderIds = ['fontSize','perspective','rotateX','rotateY','rotateZ','scaleY','posX','posY'];
const valIds = ['v-fs','v-persp','v-rx','v-ry','v-rz','v-sy','v-px','v-py'];

// ── Update preview ──
function update() {
  const fs = +document.getElementById('fontSize').value;
  const persp = +document.getElementById('perspective').value;
  const rx = +document.getElementById('rotateX').value;
  const ry = +document.getElementById('rotateY').value;
  const rz = +document.getElementById('rotateZ').value;
  const sy = +document.getElementById('scaleY').value;
  const px = +document.getElementById('posX').value;
  const py = +document.getElementById('posY').value;
  const color = document.getElementById('textColor').value;
  const font = document.getElementById('fontFamily').value;

  // Update value labels
  document.getElementById('v-fs').textContent = fs;
  document.getElementById('v-persp').textContent = persp;
  document.getElementById('v-rx').textContent = rx;
  document.getElementById('v-ry').textContent = ry;
  document.getElementById('v-rz').textContent = rz;
  document.getElementById('v-sy').textContent = sy;
  document.getElementById('v-px').textContent = px;
  document.getElementById('v-py').textContent = py;

  // Scale for preview (1080 → 360)
  const scale = PHONE_W / CANVAS_W;
  const scaledFs = fs * scale;

  // Stage positioning
  stage.style.left = px + '%';
  stage.style.top = py + '%';
  stage.style.perspective = (persp * scale) + 'px';

  // Ground text transform
  let t = `rotateX(${rx}deg)`;
  if (ry !== 0) t += ` rotateY(${ry}deg)`;
  if (rz !== 0) t += ` rotateZ(${rz}deg)`;
  t += ` scaleY(${sy})`;

  groundText.style.fontSize = scaledFs + 'px';
  groundText.style.transform = t;
  groundText.style.color = color;
  groundText.style.fontFamily = `'${font}', 'Archivo Black', Impact, sans-serif`;

  // Load font dynamically
  loadFont(font);

  // Update text lines
  const textArea = document.getElementById('textLines');
  const lines = textArea.value.split('\n').filter(l => l.trim());
  groundText.innerHTML = lines.map(l => `<div>${l.trim()}</div>`).join('');
}

// ── Dynamic font loading ──
const loadedFonts = new Set(['Archivo Black']);
function loadFont(name) {
  if (loadedFonts.has(name)) return;
  loadedFonts.add(name);
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${name.replace(/ /g,'+')}:wght@400;700;900&display=swap`;
  document.head.appendChild(link);
}

// ── Drag to position ──
phone.addEventListener('mousedown', (e) => {
  const rect = phone.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 100;
  const my = ((e.clientY - rect.top) / rect.height) * 100;

  isDragging = true;
  document.getElementById('posX').value = Math.round(mx);
  document.getElementById('posY').value = Math.round(my);
  update();
});

document.addEventListener('mousemove', (e) => {
  // Crosshair
  const rect = phone.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  crossH.style.top = my + 'px';
  crossV.style.left = mx + 'px';

  if (!isDragging) return;
  const px = Math.max(5, Math.min(95, (mx / rect.width) * 100));
  const py = Math.max(10, Math.min(95, (my / rect.height) * 100));
  document.getElementById('posX').value = Math.round(px);
  document.getElementById('posY').value = Math.round(py);
  update();
});

document.addEventListener('mouseup', () => { isDragging = false; });

// ── Color sync ──
document.getElementById('textColor').addEventListener('input', (e) => {
  document.getElementById('textColorHex').value = e.target.value.toUpperCase();
  update();
});
document.getElementById('textColorHex').addEventListener('input', (e) => {
  const v = e.target.value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    document.getElementById('textColor').value = v;
    update();
  }
});

// ── Build spec JSON from current UI state ──
function buildSpec() {
  const lines = document.getElementById('textLines').value.split('\n').filter(l => l.trim());
  return {
    fps: 30, width: 1080, height: 1920,
    durationFrames: 150, durationMs: 5000,
    backgroundImage: "groundCaptions/background.png",
    videoSrc: null, showBackground: true, backgroundColor: "#222",
    textColor: document.getElementById('textColor').value.toUpperCase(),
    fontFamily: document.getElementById('fontFamily').value,
    fontSize: +document.getElementById('fontSize').value,
    enableShadow: true, lineHeight: 0.85,
    animation: "slideForward", blendMode: "normal", textOpacity: 0.95,
    perspective: {
      distance: +document.getElementById('perspective').value,
      rotateX: +document.getElementById('rotateX').value,
      rotateY: +document.getElementById('rotateY').value,
      rotateZ: +document.getElementById('rotateZ').value,
      scaleY: +document.getElementById('scaleY').value,
    },
    position: {
      x: +document.getElementById('posX').value,
      y: +document.getElementById('posY').value,
    },
    lines: lines.map((text, i) => ({ text: text.trim(), startFrame: i * 8 })),
  };
}

// ── Load spec from server ──
async function loadSpec() {
  setStatus('Loading...', '');
  try {
    const res = await fetch(API + '/api/spec');
    if (!res.ok) throw new Error('No spec found');
    spec = await res.json();
    applySpecToUI(spec);
    setStatus('Spec loaded', 'ok');
  } catch (e) {
    setStatus('Failed to load: ' + e.message, 'error');
  }
}

function applySpecToUI(s) {
  if (s.fontSize) document.getElementById('fontSize').value = s.fontSize;
  if (s.perspective?.distance) document.getElementById('perspective').value = s.perspective.distance;
  if (s.perspective?.rotateX != null) document.getElementById('rotateX').value = s.perspective.rotateX;
  if (s.perspective?.rotateY != null) document.getElementById('rotateY').value = s.perspective.rotateY;
  if (s.perspective?.rotateZ != null) document.getElementById('rotateZ').value = s.perspective.rotateZ;
  if (s.perspective?.scaleY) document.getElementById('scaleY').value = s.perspective.scaleY;
  if (s.position?.x) document.getElementById('posX').value = s.position.x;
  if (s.position?.y) document.getElementById('posY').value = s.position.y;
  if (s.textColor) {
    document.getElementById('textColor').value = s.textColor;
    document.getElementById('textColorHex').value = s.textColor;
  }
  if (s.fontFamily) document.getElementById('fontFamily').value = s.fontFamily;
  if (s.lines?.length) {
    document.getElementById('textLines').value = s.lines.map(l => l.text).join('\n');
  }
  update();
}

// ── Save spec to server ──
async function saveSpec() {
  setStatus('Saving...', '');
  try {
    const res = await fetch(API + '/api/spec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildSpec()),
    });
    if (!res.ok) throw new Error('Save failed');
    setStatus('Spec saved ✓', 'ok');
  } catch (e) {
    setStatus('Save failed: ' + e.message, 'error');
  }
}

// ── Save & Render ──
async function saveAndRender() {
  await saveSpec();

  const btn = document.getElementById('renderBtn');
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('progressLabel');
  const pct = document.getElementById('progressPct');

  btn.disabled = true;
  btn.textContent = 'Rendering...';
  btn.style.opacity = '0.5';
  wrap.style.display = 'block';
  bar.style.width = '0%';
  pct.textContent = '0%';
  label.textContent = 'Starting render...';
  setStatus('', '');

  try {
    const res = await fetch(API + '/api/render', { method: 'POST' });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || 'Render failed to start');
    }
    pollProgress();
  } catch (e) {
    setStatus('Render failed: ' + e.message, 'error');
    resetRenderBtn();
  }
}

function pollProgress() {
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('progressLabel');
  const pct = document.getElementById('progressPct');

  const poll = async () => {
    try {
      const res = await fetch(API + '/api/render/progress');
      const d = await res.json();

      bar.style.width = d.progress + '%';
      pct.textContent = d.progress + '%';

      if (d.status === 'rendering') {
        if (d.progress >= 90) {
          label.textContent = 'Stitching video...';
        } else if (d.totalFrames > 0) {
          label.textContent = `Frame ${d.frame}/${d.totalFrames}`;
        } else {
          label.textContent = 'Rendering...';
        }
        setTimeout(poll, 500);
      } else if (d.status === 'done') {
        bar.style.width = '100%';
        bar.style.background = '#2d8';
        pct.textContent = '100%';
        label.textContent = 'Complete!';
        setStatus('Video saved → out/ground-captions.mp4', 'ok');
        resetRenderBtn();
      } else if (d.status === 'error') {
        bar.style.background = '#f55';
        label.textContent = 'Failed';
        setStatus(d.error || 'Render failed', 'error');
        resetRenderBtn();
      } else {
        setTimeout(poll, 1000);
      }
    } catch {
      setTimeout(poll, 1000);
    }
  };
  setTimeout(poll, 1000);
}

function resetRenderBtn() {
  const btn = document.getElementById('renderBtn');
  btn.disabled = false;
  btn.textContent = 'Save & Render Video';
  btn.style.opacity = '1';
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── Init ──
sliderIds.forEach(id => document.getElementById(id).addEventListener('input', update));
document.getElementById('textLines').addEventListener('input', update);
document.getElementById('fontFamily').addEventListener('input', update);

// Auto-load spec on page load
loadSpec().catch(() => update());
</script>
</body>
</html>
